<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Course Management System</h1>

    <section class="form-section">
        <h2>Create Course</h2>
        <form id="courseForm">
            <input type="text" id="title" placeholder="Course title" required>
            <textarea id="description" placeholder="Course description"></textarea>
            <input type="number" id="durationInHours" placeholder="Duration in hours" required>
            <input type="number" id="instructorId" placeholder="Instructor ID" required>
            <input type="text" id="categoryIds" placeholder="Category IDs (e.g. 1,2)">
            <input type="text" id="studentIds" placeholder="Student IDs (e.g. 2,3)">
            <button type="submit">Create Course</button>
        </form>
    </section>

    <section class="list-section">
        <h2>Courses</h2>
        <button onclick="loadCourses()">Refresh Courses</button>
        <div id="courseList"></div>
    </section>

    <section class="form-section">
        <h2>Enroll Student to Course</h2>
        <form id="enrollForm">
            <input type="number" id="enrollCourseId" placeholder="Course ID" required>
            <input type="number" id="enrollStudentId" placeholder="Student ID" required>
            <button type="submit">Enroll Student</button>
        </form>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
